name: Mobile Tests

on:
  push:
    branches: [master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-tests.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: mobile/yarn.lock

      - run: yarn install --frozen-lockfile

      - run: yarn test
